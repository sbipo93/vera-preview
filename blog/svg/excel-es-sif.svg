<svg viewBox="0 0 400 412" xmlns="http://www.w3.org/2000/svg" font-family="Lexend, sans-serif">
  <rect x="0" y="0" width="400" height="412" rx="16" fill="#f7f6f4"/>
  <text x="24" y="42" font-size="20" font-weight="700" fill="#161614">¿Tu Excel hace las cuentas solo?</text>

  <!-- TARJETA SÍ -->
  <rect x="20" y="62" width="360" height="166" rx="12" fill="#ffffff"/>
  <rect x="20" y="62" width="6" height="166" rx="3" fill="#2fa89a"/>
  <rect x="40" y="80" width="44" height="26" rx="13" fill="#2fa89a"/>
  <text x="62" y="98" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">SÍ</text>
  <text x="40" y="134" font-size="14" fill="#3d3b37">Calcula el IVA, guarda facturas, saca listados.</text>
  <text x="40" y="164" font-size="14" font-weight="700" fill="#161614">→ Para Hacienda ya es un programa (un SIF).</text>
  <text x="40" y="188" font-size="14" fill="#3d3b37">Tendrá que cumplir VeriFactu.</text>
  <text x="40" y="216" font-size="15" font-weight="700" fill="#2fa89a">Autónomos: 1 de julio de 2027.</text>

  <!-- TARJETA NO -->
  <rect x="20" y="244" width="360" height="122" rx="12" fill="#ffffff"/>
  <rect x="20" y="244" width="6" height="122" rx="3" fill="#9a978f"/>
  <rect x="40" y="262" width="190" height="26" rx="13" fill="#e2e0db"/>
  <text x="135" y="280" font-size="14" font-weight="700" fill="#3d3b37" text-anchor="middle">NO · solo tecleo e imprimo</text>
  <text x="40" y="316" font-size="14" fill="#3d3b37">Lo usas como una máquina de escribir.</text>
  <text x="40" y="346" font-size="15" font-weight="700" fill="#161614">→ Puede quedar fuera.</text>

  <text x="24" y="396" font-size="13" fill="#6b6963">La pregunta no es el Excel: es si hace las cuentas solo.</text>
</svg>
