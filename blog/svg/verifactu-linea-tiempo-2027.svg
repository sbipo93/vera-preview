<svg viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg" font-family="Lexend, sans-serif">
  <rect x="0" y="0" width="400" height="380" rx="16" fill="#f7f6f4"/>
  <text x="28" y="46" font-size="22" font-weight="700" fill="#161614">VeriFactu: cuándo te toca</text>
  <text x="28" y="70" font-size="14" fill="#6b6963">Fechas vigentes tras el RDL 15/2025</text>

  <!-- línea vertical -->
  <line x1="56" y1="104" x2="56" y2="330" stroke="#cfcdc8" stroke-width="3"/>

  <!-- nodo 1: hoy -->
  <circle cx="56" cy="118" r="9" fill="#f7f6f4" stroke="#2fa89a" stroke-width="3"/>
  <text x="84" y="114" font-size="16" font-weight="700" fill="#161614">Hoy · junio 2026</text>
  <text x="84" y="136" font-size="14" fill="#3d3b37">Ya puedes facturar VeriFactu</text>
  <text x="84" y="155" font-size="14" fill="#3d3b37">de forma voluntaria.</text>

  <!-- nodo 2: sociedades -->
  <circle cx="56" cy="206" r="9" fill="#2fa89a"/>
  <text x="84" y="202" font-size="16" font-weight="700" fill="#161614">1 enero 2027</text>
  <text x="84" y="224" font-size="14" fill="#3d3b37">Obligatorio para Sociedades (S.L.).</text>

  <!-- nodo 3: autónomos (destacado) -->
  <circle cx="56" cy="300" r="13" fill="#2fa89a"/>
  <circle cx="56" cy="300" r="22" fill="none" stroke="#2fa89a" stroke-width="2" opacity="0.5"/>
  <text x="92" y="294" font-size="18" font-weight="700" fill="#161614">1 julio 2027</text>
  <text x="92" y="317" font-size="15" font-weight="700" fill="#2fa89a">Autónomos — tu fecha</text>
  <text x="92" y="337" font-size="13" fill="#6b6963">Tienes margen. Adelantarte = cero prisas.</text>
</svg>
